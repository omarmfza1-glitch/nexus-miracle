# Nexus Miracle - Docker Compose Configuration
version: "3.9"

services:
  nexus-miracle:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: nexus-miracle-api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
    env_file:
      - .env
    volumes:
      # Mount source code for development hot-reload
      - ./app:/app/app:ro
      # Persist logs
      - ./logs:/app/logs
      # Static files
      - ./static:/app/static
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - nexus-network

  # Optional: Redis for session/cache (uncomment when needed)
  # redis:
  #   image: redis:7-alpine
  #   container_name: nexus-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   networks:
  #     - nexus-network

networks:
  nexus-network:
    driver: bridge

